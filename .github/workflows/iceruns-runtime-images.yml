name: IceRuns Runtime Images - Build and Push

on:
  push:
    branches: [main]
    paths:
      - 'services/iceruns-invoker/runtime-images/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}/iceruns

jobs:
  build-platform:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        runtime:
          - name: python
            dockerfile: Dockerfile.python
            version: '3.13'
          - name: nodejs
            dockerfile: Dockerfile.nodejs
            version: '20'
          - name: go
            dockerfile: Dockerfile.go
            version: '1.23'
          - name: ruby
            dockerfile: Dockerfile.ruby
            version: '3.3'
          - name: bash
            dockerfile: Dockerfile.bash
            version: '5.2'
          - name: powershell
            dockerfile: Dockerfile.powershell
            version: '7.4'
          - name: rust
            dockerfile: Dockerfile.rust
            version: '1.75'
        platform: [linux/amd64, linux/arm64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.runtime.name }}
          tags: |
            type=raw,value=${{ matrix.runtime.version }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
            type=raw,value=latest-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}

      - name: Build and push runtime image (per platform)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7
        with:
          context: services/iceruns-invoker/runtime-images
          file: services/iceruns-invoker/runtime-images/${{ matrix.runtime.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.runtime.name }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.runtime.name }}-${{ matrix.platform }}

      - name: Run Trivy security scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.runtime.name }}:${{ matrix.runtime.version }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          format: 'sarif'
          output: 'trivy-results-${{ matrix.runtime.name }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225  # v4
        with:
          sarif_file: 'trivy-results-${{ matrix.runtime.name }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}.sarif'
          category: 'trivy-${{ matrix.runtime.name }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}'
        continue-on-error: true

  merge-manifests:
    name: Merge Runtime Manifests
    runs-on: ubuntu-latest
    needs: build-platform
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        runtime:
          - name: python
            version: '3.13'
          - name: nodejs
            version: '20'
          - name: go
            version: '1.23'
          - name: ruby
            version: '3.3'
          - name: bash
            version: '5.2'
          - name: powershell
            version: '7.4'
          - name: rust
            version: '1.75'

    steps:
      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - name: Merge manifests
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
          RUNTIME_NAME: ${{ matrix.runtime.name }}
          RUNTIME_VERSION: ${{ matrix.runtime.version }}
        run: |
          docker buildx imagetools create \
            -t $REGISTRY/$IMAGE_PREFIX/$RUNTIME_NAME:$RUNTIME_VERSION \
            $REGISTRY/$IMAGE_PREFIX/$RUNTIME_NAME:$RUNTIME_VERSION-amd64 \
            $REGISTRY/$IMAGE_PREFIX/$RUNTIME_NAME:$RUNTIME_VERSION-arm64

          docker buildx imagetools create \
            -t $REGISTRY/$IMAGE_PREFIX/$RUNTIME_NAME:latest \
            $REGISTRY/$IMAGE_PREFIX/$RUNTIME_NAME:latest-amd64 \
            $REGISTRY/$IMAGE_PREFIX/$RUNTIME_NAME:latest-arm64

  summary:
    name: Runtime Build Summary
    runs-on: ubuntu-latest
    needs: merge-manifests
    if: always()

    steps:
      - name: Create summary
        run: |
          echo "# IceRuns Runtime Images Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Runtimes Built" >> $GITHUB_STEP_SUMMARY
          echo "- Python 3.13" >> $GITHUB_STEP_SUMMARY
          echo "- Node.js 20" >> $GITHUB_STEP_SUMMARY
          echo "- Go 1.23" >> $GITHUB_STEP_SUMMARY
          echo "- Ruby 3.3" >> $GITHUB_STEP_SUMMARY
          echo "- Bash 5.2" >> $GITHUB_STEP_SUMMARY
          echo "- PowerShell 7.4" >> $GITHUB_STEP_SUMMARY
          echo "- Rust 1.75" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Platforms" >> $GITHUB_STEP_SUMMARY
          echo "- linux/amd64" >> $GITHUB_STEP_SUMMARY
          echo "- linux/arm64" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Job Status" >> $GITHUB_STEP_SUMMARY
          echo "- Build: ${{ needs.build-platform.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Merge: ${{ needs.merge-manifests.result }}" >> $GITHUB_STEP_SUMMARY

      - name: Check if all jobs succeeded
        if: needs.build-platform.result != 'success' || needs.merge-manifests.result != 'success'
        run: |
          echo "One or more runtime builds failed"
          exit 1
