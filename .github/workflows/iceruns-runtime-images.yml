name: IceRuns Runtime Images - Build and Push

on:
  push:
    branches: [main]
    paths:
      - 'services/iceruns-invoker/runtime-images/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}/iceruns

jobs:
  build-runtime-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        runtime:
          - name: python
            dockerfile: Dockerfile.python
            version: '3.13'
          - name: nodejs
            dockerfile: Dockerfile.nodejs
            version: '20'
          - name: go
            dockerfile: Dockerfile.go
            version: '1.23'
          - name: ruby
            dockerfile: Dockerfile.ruby
            version: '3.3'
          - name: bash
            dockerfile: Dockerfile.bash
            version: '5.2'
          - name: powershell
            dockerfile: Dockerfile.powershell
            version: '7.4'
          - name: rust
            dockerfile: Dockerfile.rust
            version: '1.75'
        platform: [linux/amd64, linux/arm64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.runtime.name }}
          tags: |
            type=raw,value=${{ matrix.runtime.version }}
            type=raw,value=latest

      - name: Build and push runtime image
        uses: docker/build-push-action@v5
        with:
          context: services/iceruns-invoker/runtime-images
          file: services/iceruns-invoker/runtime-images/${{ matrix.runtime.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.runtime.name }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.runtime.name }}-${{ matrix.platform }}

      - name: Run Trivy security scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.runtime.name }}:${{ matrix.runtime.version }}
          format: 'sarif'
          output: 'trivy-results-${{ matrix.runtime.name }}.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results-${{ matrix.runtime.name }}.sarif'
          category: 'trivy-${{ matrix.runtime.name }}'
        continue-on-error: true

  summary:
    name: Runtime Build Summary
    runs-on: ubuntu-latest
    needs: build-runtime-images
    if: always()

    steps:
      - name: Create summary
        run: |
          echo "# IceRuns Runtime Images Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Runtimes Built" >> $GITHUB_STEP_SUMMARY
          echo "- Python 3.13" >> $GITHUB_STEP_SUMMARY
          echo "- Node.js 20" >> $GITHUB_STEP_SUMMARY
          echo "- Go 1.23" >> $GITHUB_STEP_SUMMARY
          echo "- Ruby 3.3" >> $GITHUB_STEP_SUMMARY
          echo "- Bash 5.2" >> $GITHUB_STEP_SUMMARY
          echo "- PowerShell 7.4" >> $GITHUB_STEP_SUMMARY
          echo "- Rust 1.75" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Platforms" >> $GITHUB_STEP_SUMMARY
          echo "- linux/amd64" >> $GITHUB_STEP_SUMMARY
          echo "- linux/arm64" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Job Status" >> $GITHUB_STEP_SUMMARY
          echo "- Build: ${{ needs.build-runtime-images.result }}" >> $GITHUB_STEP_SUMMARY

      - name: Check if all jobs succeeded
        if: needs.build-runtime-images.result != 'success'
        run: |
          echo "One or more runtime builds failed"
          exit 1
