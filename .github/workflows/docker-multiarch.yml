name: Build Multi-Arch Docker Images

on:
  push:
    branches:
      - main
      - 'v*'
      - 'feature/**'
      - 'develop'
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: penguintechinc/icecharts

jobs:
  # Determine version tag based on branch/release
  version:
    name: Determine Version Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read version from .version file
        id: version
        run: |
          # Read version file and extract semantic version (first 3 components)
          if [ -f .version ]; then
            FULL_VERSION=$(cat .version | tr -d '[:space:]')
            VERSION=$(echo "$FULL_VERSION" | cut -d'.' -f1-3)
          else
            VERSION="0.0.0"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Determine tag suffix based on trigger
          if [[ "${{ github.event_name }}" == "release" ]]; then
            # Release: v1.0.0
            TAG="v${VERSION}"
            echo "Release build: $TAG"
          elif [[ "${{ github.ref }}" == refs/heads/v* ]]; then
            # Release branch (v*.x): v1.0.0-beta
            TAG="v${VERSION}-beta"
            echo "Release branch build: $TAG"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            # Main branch: v1.0.0-gamma
            TAG="v${VERSION}-gamma"
            echo "Main branch build: $TAG"
          else
            # Other branches: v1.0.0-alpha
            TAG="v${VERSION}-alpha"
            echo "Feature/develop build: $TAG"
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Final tag: $TAG"

  # Build and push multi-arch images
  build:
    name: Build ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    needs: version
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: flask-backend
            context: .
            dockerfile: services/flask-backend/Dockerfile
          - name: webui
            context: services/webui
            dockerfile: services/webui/Dockerfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}
          tags: |
            type=raw,value=${{ needs.version.outputs.tag }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=${{ needs.version.outputs.tag }}-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}
          build-args: |
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ needs.version.outputs.version }}
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}

      - name: Image digest
        run: echo "Image pushed with digest - ${{ steps.meta.outputs.tags }}"

  # Security scan with Trivy
  security:
    name: Security Scan ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [version, build]
    permissions:
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        service: [flask-backend, webui]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ needs.version.outputs.tag }}
          format: 'sarif'
          output: 'trivy-results-${{ matrix.service }}.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results-${{ matrix.service }}.sarif'
          category: 'trivy-${{ matrix.service }}'

      - name: Trivy scan summary
        run: |
          echo "Trivy scan completed for ${{ matrix.service }}"
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ needs.version.outputs.tag }}"

  # Summary job
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [version, build, security]
    if: always()

    steps:
      - name: Create summary
        run: |
          echo "# Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Version Information" >> $GITHUB_STEP_SUMMARY
          echo "- Version: \`${{ needs.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Tag: \`${{ needs.version.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Images Built" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/flask-backend:${{ needs.version.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/webui:${{ needs.version.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Job Status" >> $GITHUB_STEP_SUMMARY
          echo "- Build: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Security: ${{ needs.security.result }}" >> $GITHUB_STEP_SUMMARY

      - name: Check if all jobs succeeded
        if: needs.build.result != 'success' || needs.security.result != 'success'
        run: |
          echo "One or more jobs failed"
          exit 1
