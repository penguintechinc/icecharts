name: Build Multi-Arch Docker Images

on:
  push:
    branches:
      - main
      - 'v*'
      - 'feature/**'
      - 'develop'
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # Determine version tag based on branch/release
  version:
    name: Determine Version Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read version from .version file
        id: version
        run: |
          # Read version file and extract semantic version (first 3 components)
          if [ -f .version ]; then
            FULL_VERSION=$(cat .version | tr -d '[:space:]')
            VERSION=$(echo "$FULL_VERSION" | cut -d'.' -f1-3)
          else
            VERSION="0.0.0"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Determine tag suffix based on trigger
          if [[ "${{ github.event_name }}" == "release" ]]; then
            # Release: v1.0.0
            TAG="v${VERSION}"
            echo "Release build: $TAG"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            # Main branch: v1.0.0-beta
            TAG="v${VERSION}-beta"
            echo "Main branch build: $TAG"
          else
            # Other branches: v1.0.0-alpha
            TAG="v${VERSION}-alpha"
            echo "Feature/develop build: $TAG"
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Final tag: $TAG"

  # Build and push multi-arch images
  build:
    name: Build ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    needs: version
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: flask-backend
            context: .
            dockerfile: services/flask-backend/Dockerfile
          - name: webui
            context: services/webui
            dockerfile: services/webui/Dockerfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}
          tags: |
            type=raw,value=${{ needs.version.outputs.tag }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=${{ needs.version.outputs.tag }}-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}
          build-args: |
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ needs.version.outputs.version }}

      - name: Image digest
        run: echo "Image pushed with digest - ${{ steps.meta.outputs.tags }}"

  # Run API tests against built images
  test:
    name: API Tests
    runs-on: ubuntu-latest
    needs: [version, build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull built images
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/flask-backend:${{ needs.version.outputs.tag }}
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/webui:${{ needs.version.outputs.tag }}

      - name: Create test docker-compose
        run: |
          cat << EOF > docker-compose.test.yml
          version: '3.8'
          services:
            postgres:
              image: postgres:17-alpine
              environment:
                POSTGRES_DB: icecharts
                POSTGRES_USER: icecharts
                POSTGRES_PASSWORD: icecharts_password
              ports:
                - "5432:5432"
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -U icecharts -d icecharts"]
                interval: 5s
                timeout: 5s
                retries: 10

            redis:
              image: redis:7-alpine
              command: redis-server --requirepass redis_password
              ports:
                - "6379:6379"
              healthcheck:
                test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
                interval: 5s
                timeout: 5s
                retries: 10

            minio:
              image: minio/minio:latest
              command: server /data --console-address ":9001"
              environment:
                MINIO_ROOT_USER: minioadmin
                MINIO_ROOT_PASSWORD: minioadmin
              ports:
                - "9000:9000"
                - "9001:9001"
              healthcheck:
                test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
                interval: 10s
                timeout: 5s
                retries: 5

            api:
              image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/flask-backend:${{ needs.version.outputs.tag }}
              ports:
                - "5001:5000"
              environment:
                - FLASK_ENV=production
                - DATABASE_URL=postgresql://icecharts:icecharts_password@postgres:5432/icecharts
                - REDIS_URL=redis://:redis_password@redis:6379/0
                - JWT_SECRET_KEY=test-secret-key-for-ci
                - SECRET_KEY=test-secret-key-for-ci
                - S3_ENDPOINT=http://minio:9000
                - S3_ACCESS_KEY=minioadmin
                - S3_SECRET_KEY=minioadmin
                - S3_BUCKET=icecharts
                - RATELIMIT_ENABLED=false
              depends_on:
                postgres:
                  condition: service_healthy
                redis:
                  condition: service_healthy
                minio:
                  condition: service_healthy
              healthcheck:
                test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/health"]
                interval: 10s
                timeout: 5s
                retries: 10

            web:
              image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/webui:${{ needs.version.outputs.tag }}
              ports:
                - "3000:80"
              depends_on:
                api:
                  condition: service_healthy
              healthcheck:
                test: ["CMD", "curl", "-f", "http://localhost:80/health"]
                interval: 10s
                timeout: 5s
                retries: 5
          EOF

      - name: Start test environment
        run: |
          docker-compose -f docker-compose.test.yml up -d
          echo "Waiting for all services to be healthy..."
          sleep 30

      - name: Check service health
        run: |
          docker-compose -f docker-compose.test.yml ps

          # Verify all services are healthy
          if ! docker-compose -f docker-compose.test.yml ps | grep -q "Up (healthy)"; then
            echo "Not all services are healthy"
            docker-compose -f docker-compose.test.yml logs
            exit 1
          fi

      - name: Run Flask API tests
        run: |
          chmod +x tests/api/test_flask_api.sh
          API_HOST=http://localhost:5001 tests/api/test_flask_api.sh

      - name: Run WebUI tests
        run: |
          chmod +x tests/api/test_webui.sh
          WEBUI_HOST=http://localhost:3000 tests/api/test_webui.sh

      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== API Logs ==="
          docker-compose -f docker-compose.test.yml logs api
          echo "=== Web Logs ==="
          docker-compose -f docker-compose.test.yml logs web
          echo "=== Database Logs ==="
          docker-compose -f docker-compose.test.yml logs postgres
          echo "=== Redis Logs ==="
          docker-compose -f docker-compose.test.yml logs redis

      - name: Cleanup test environment
        if: always()
        run: |
          docker-compose -f docker-compose.test.yml down -v
          docker system prune -f

  # Security scan with Trivy
  security:
    name: Security Scan ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [version, build]
    permissions:
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        service: [flask-backend, webui]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ needs.version.outputs.tag }}
          format: 'sarif'
          output: 'trivy-results-${{ matrix.service }}.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results-${{ matrix.service }}.sarif'
          category: 'trivy-${{ matrix.service }}'

      - name: Trivy scan summary
        run: |
          echo "Trivy scan completed for ${{ matrix.service }}"
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ needs.version.outputs.tag }}"

  # Summary job
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [version, build, test, security]
    if: always()

    steps:
      - name: Create summary
        run: |
          echo "# Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Version Information" >> $GITHUB_STEP_SUMMARY
          echo "- Version: \`${{ needs.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Tag: \`${{ needs.version.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Images Built" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/flask-backend:${{ needs.version.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/webui:${{ needs.version.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Job Status" >> $GITHUB_STEP_SUMMARY
          echo "- Build: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tests: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security: ${{ needs.security.result }}" >> $GITHUB_STEP_SUMMARY

      - name: Check if all jobs succeeded
        if: needs.build.result != 'success' || needs.test.result != 'success' || needs.security.result != 'success'
        run: |
          echo "One or more jobs failed"
          exit 1
