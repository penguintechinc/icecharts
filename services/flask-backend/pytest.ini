[pytest]
# Pytest configuration for IceCharts Flask Backend

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 7.0

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Test markers
markers =
    auth: Authentication tests
    crud: CRUD operation tests
    permissions: Permission and RBAC tests
    integration: Integration tests
    slow: Slow running tests
    unit: Unit tests

# Coverage options
[coverage:run]
source = app
omit =
    */tests/*
    */site-packages/*
    */__init__.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod
