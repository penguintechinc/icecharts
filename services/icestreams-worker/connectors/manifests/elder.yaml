      endpoint: /api/v1/issues/{{issue_id}}
      method: GET
      inputs:
        - name: in
          type: any
          required: true
      outputs:
        - name: out
          type: object
      config_schema:
        - field: issue_id
          type: string
          label: Issue ID
          supports_variables: true
          required: true
        - field: include_comments
