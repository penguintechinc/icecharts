# Microsoft SQL Server Connector Manifest for IceCharts
connector:
  id: db_mssql
  name: Microsoft SQL Server
  description: Microsoft SQL Server relational database connector with full T-SQL support
  icon: "🏢"
  color: "#CC2927"
  version: "1.0.0"
  vendor: database

  auth:
    methods:
      - type: api_key
        env_var: MSSQL_CONNECTION_STRING

  connection:
    base_url_env: ICECHARTS_API_URL
    default_url: http://localhost:5000
    health_endpoint: /api/v1/database-ops/health

  triggers:
    - id: data_changed
      name: Data Changed
      description: Poll for data changes in a SQL Server table
      icon: "🔄"
      webhook_path: /webhooks/database/mssql/data_changed
      outputs:
        - name: out
          type: object
          description: Changed data with operation type
      config_schema:
        - field: table
          type: string
          label: Table Name
          required: true
          placeholder: "users"
        - field: poll_interval
          type: number
          label: Poll Interval (seconds)
          default: 60
        - field: track_column
          type: string
          label: Track Column
          placeholder: "updated_at"
          description: Column to detect changes (timestamp or sequence)
        - field: schema
          type: string
          label: Schema
          default: "dbo"

    - id: scheduled_query
      name: Scheduled Query
      description: Run a query on a schedule
      icon: "⏰"
      webhook_path: /webhooks/database/mssql/scheduled
      outputs:
        - name: out
          type: object
          description: Query results
      config_schema:
        - field: query
          type: textarea
          label: SQL Query
          required: true
          placeholder: "SELECT * FROM users WHERE status = 'active'"
        - field: schedule
          type: string
          label: Cron Schedule
          required: true
          placeholder: "*/5 * * * *"
          description: Cron expression for schedule

  actions:
    - id: execute_query
      name: Execute Query
      description: Execute a SELECT query
      icon: "🔍"
      endpoint: /api/v1/database-ops/query
      method: POST
      inputs:
        - name: in
          type: any
          required: false
      outputs:
        - name: out
          type: object
          description: Query results
      config_schema:
        - field: table
          type: string
          label: Table
          required: true
          supports_variables: true
        - field: fields
          type: string
          label: Fields
          placeholder: "id, name, email"
          description: Comma-separated field names (empty for all)
        - field: where
          type: textarea
          label: Where (JSON)
          supports_variables: true
          placeholder: '{"status": "active"}'
        - field: limit
          type: number
          label: Limit
          default: 100
        - field: schema
          type: string
          label: Schema
          default: "dbo"
        - field: driver
          type: string
          label: ODBC Driver
          default: "ODBC Driver 18 for SQL Server"
        - field: encrypt
          type: checkbox
          label: Encrypt Connection
          default: true
        - field: trust_server_certificate
          type: checkbox
          label: Trust Server Certificate
          default: false

    - id: insert_row
      name: Insert Row
      description: Insert a row into a table
      icon: "➕"
      endpoint: /api/v1/database-ops/insert
      method: POST
      inputs:
        - name: in
          type: any
          required: false
      outputs:
        - name: out
          type: object
      config_schema:
        - field: table
          type: string
          label: Table
          required: true
          supports_variables: true
        - field: data
          type: textarea
          label: Row Data (JSON)
          required: true
          supports_variables: true
          placeholder: '{"name": "John", "email": "john@example.com"}'

    - id: update_rows
      name: Update Rows
      description: Update rows matching conditions
      icon: "✏️"
      endpoint: /api/v1/database-ops/update
      method: POST
      inputs:
        - name: in
          type: any
          required: false
      outputs:
        - name: out
          type: object
      config_schema:
        - field: table
          type: string
          label: Table
          required: true
          supports_variables: true
        - field: where
          type: textarea
          label: Where (JSON)
          required: true
          supports_variables: true
          placeholder: '{"id": 1}'
        - field: data
          type: textarea
          label: Update Data (JSON)
          required: true
          supports_variables: true
          placeholder: '{"name": "Updated"}'

    - id: delete_rows
      name: Delete Rows
      description: Delete rows matching conditions
      icon: "🗑️"
      endpoint: /api/v1/database-ops/delete
      method: POST
      inputs:
        - name: in
          type: any
          required: false
      outputs:
        - name: out
          type: object
      config_schema:
        - field: table
          type: string
          label: Table
          required: true
          supports_variables: true
        - field: where
          type: textarea
          label: Where (JSON)
          required: true
          supports_variables: true
          placeholder: '{"id": 1}'

    - id: bulk_insert
      name: Bulk Insert
      description: Insert multiple rows at once
      icon: "📥"
      endpoint: /api/v1/database-ops/bulk-insert
      method: POST
      inputs:
        - name: in
          type: any
          required: false
      outputs:
        - name: out
          type: object
      config_schema:
        - field: table
          type: string
          label: Table
          required: true
          supports_variables: true
        - field: rows
          type: textarea
          label: Rows (JSON Array)
          required: true
          supports_variables: true
          placeholder: '[{"name": "A"}, {"name": "B"}]'

    - id: call_procedure
      name: Call Stored Procedure
      description: Call a SQL Server stored procedure
      icon: "⚡"
      endpoint: /api/v1/database-ops/procedure
      method: POST
      inputs:
        - name: in
          type: any
          required: false
      outputs:
        - name: out
          type: object
      config_schema:
        - field: procedure
          type: string
          label: Procedure Name
          required: true
          supports_variables: true
        - field: params
          type: textarea
          label: Parameters (JSON Array)
          supports_variables: true
          placeholder: '["param1", 42]'

    - id: bulk_copy
      name: Bulk Copy (BCP)
      description: High-performance bulk copy operation for large data imports
      icon: "📋"
      endpoint: /api/v1/database-ops/bulk-insert
      method: POST
      inputs:
        - name: in
          type: any
          required: false
      outputs:
        - name: out
          type: object
      config_schema:
        - field: table
          type: string
          label: Table
          required: true
          supports_variables: true
        - field: rows
          type: textarea
          label: Rows (JSON Array)
          required: true
          supports_variables: true
          placeholder: '[{"name": "A"}, {"name": "B"}]'
        - field: format
          type: select
          label: Format
          options: [csv, native]
          default: csv
          description: Data format for bulk copy operation
        - field: batch_size
          type: number
          label: Batch Size
          default: 1000
          description: Number of rows per batch

  transforms:
    - id: query_lookup
      name: Query Lookup
      description: Lookup data from a SQL Server table
      icon: "🔎"
      endpoint: /api/v1/database-ops/query
      method: POST
      inputs:
        - name: in
          type: any
          required: true
      outputs:
        - name: out
          type: object
          description: Query results
      config_schema:
        - field: table
          type: string
          label: Table
          required: true
          supports_variables: true
        - field: where
          type: textarea
          label: Where (JSON)
          supports_variables: true
        - field: fields
          type: string
          label: Fields
          placeholder: "id, name"
        - field: limit
          type: number
          label: Limit
          default: 1

    - id: count_rows
      name: Count Rows
      description: Count rows matching criteria
      icon: "🔢"
      endpoint: /api/v1/database-ops/count
      method: GET
      inputs:
        - name: in
          type: any
          required: true
      outputs:
        - name: out
          type: object
      config_schema:
        - field: table
          type: string
          label: Table
          required: true
          supports_variables: true
        - field: where
          type: textarea
          label: Where (JSON)
          supports_variables: true

    - id: check_exists
      name: Check Exists
      description: Check if a record exists
      icon: "❓"
      endpoint: /api/v1/database-ops/exists
      method: GET
      inputs:
        - name: in
          type: any
          required: true
      outputs:
        - name: out
          type: object
      config_schema:
        - field: table
          type: string
          label: Table
          required: true
          supports_variables: true
        - field: where
          type: textarea
          label: Where (JSON)
          required: true
          supports_variables: true

    - id: get_schema
      name: Get Schema
      description: Get table schema information
      icon: "📋"
      endpoint: /api/v1/database-ops/schema
      method: GET
      inputs:
        - name: in
          type: any
          required: false
      outputs:
        - name: out
          type: object
      config_schema:
        - field: table
          type: string
          label: Table Name
          supports_variables: true
          description: Specific table name (empty to list all tables)
