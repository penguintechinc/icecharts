# CouchDB Connector Manifest for IceCharts
connector:
  id: db_couchdb
  name: CouchDB
  description: CouchDB database connector for IceCharts workflows
  icon: "🛋️"
  color: "#E42528"
  version: "1.0.0"
  vendor: database

  auth:
    methods:
      - type: api_key
        env_var: COUCHDB_CONNECTION_STRING

  connection:
    base_url_env: ICECHARTS_API_URL
    default_url: http://localhost:5000
    health_endpoint: /api/v1/database-ops/health

  triggers:
    - id: data_changed
      name: Data Changed
      description: Poll for data changes in a CouchDB database
      icon: "🔄"
      webhook_path: /webhooks/database/couchdb/data_changed
      outputs:
        - name: out
          type: object
          description: Changed data with operation type
      config_schema:
        - field: table
          type: string
          label: Database Name
          required: true
        - field: poll_interval
          type: number
          label: Poll Interval (seconds)
          default: 60
        - field: track_column
          type: string
          label: Track Column
          placeholder: "updated_at"

    - id: scheduled_query
      name: Scheduled Query
      description: Run a query on a schedule
      icon: "⏰"
      webhook_path: /webhooks/database/couchdb/scheduled
      outputs:
        - name: out
          type: object
          description: Query results
      config_schema:
        - field: query
          type: textarea
          label: Query
          required: true
        - field: schedule
          type: string
          label: Cron Schedule
          required: true
          placeholder: "*/5 * * * *"

  actions:
    - id: execute_query
      name: Execute Query
      description: Execute a query against CouchDB
      icon: "🔍"
      endpoint: /api/v1/database-ops/query
      method: POST
      inputs:
        - name: in
          type: any
          required: false
      outputs:
        - name: out
          type: object
      config_schema:
        - field: table
          type: string
          label: Database
          required: true
          supports_variables: true
        - field: fields
          type: string
          label: Fields
          placeholder: "id, name, email"
        - field: where
          type: textarea
          label: Where (JSON)
          supports_variables: true
        - field: limit
          type: number
          label: Limit
          default: 100

    - id: insert_row
      name: Insert Document
      description: Insert a document
      icon: "➕"
      endpoint: /api/v1/database-ops/insert
      method: POST
      inputs:
        - name: in
          type: any
          required: false
      outputs:
        - name: out
          type: object
      config_schema:
        - field: table
          type: string
          label: Database
          required: true
          supports_variables: true
        - field: data
          type: textarea
          label: Data (JSON)
          required: true
          supports_variables: true

    - id: update_rows
      name: Update Documents
      description: Update matching documents
      icon: "✏️"
      endpoint: /api/v1/database-ops/update
      method: POST
      inputs:
        - name: in
          type: any
          required: false
      outputs:
        - name: out
          type: object
      config_schema:
        - field: table
          type: string
          label: Database
          required: true
          supports_variables: true
        - field: where
          type: textarea
          label: Where (JSON)
          required: true
          supports_variables: true
        - field: data
          type: textarea
          label: Update Data (JSON)
          required: true
          supports_variables: true

    - id: delete_rows
      name: Delete Documents
      description: Delete matching documents
      icon: "🗑️"
      endpoint: /api/v1/database-ops/delete
      method: POST
      inputs:
        - name: in
          type: any
          required: false
      outputs:
        - name: out
          type: object
      config_schema:
        - field: table
          type: string
          label: Database
          required: true
          supports_variables: true
        - field: where
          type: textarea
          label: Where (JSON)
          required: true
          supports_variables: true

    - id: bulk_insert
      name: Bulk Insert
      description: Insert multiple documents
      icon: "📥"
      endpoint: /api/v1/database-ops/bulk-insert
      method: POST
      inputs:
        - name: in
          type: any
          required: false
      outputs:
        - name: out
          type: object
      config_schema:
        - field: table
          type: string
          label: Database
          required: true
          supports_variables: true
        - field: rows
          type: textarea
          label: Documents (JSON Array)
          required: true
          supports_variables: true

    - id: create_view
      name: Create View
      description: Create a CouchDB view
      icon: "👁️"
      endpoint: /api/v1/database-ops/query
      method: POST
      inputs:
        - name: in
          type: any
          required: false
      outputs:
        - name: out
          type: object
      config_schema:
        - field: database
          type: string
          label: Database
          required: true
          supports_variables: true
        - field: design_doc
          type: string
          label: Design Document
          required: true
          supports_variables: true
        - field: view_name
          type: string
          label: View Name
          required: true
          supports_variables: true
        - field: map_function
          type: textarea
          label: Map Function
          required: true
          supports_variables: true

    - id: replicate
      name: Replicate Database
      description: Trigger database replication
      icon: "🔄"
      endpoint: /api/v1/database-ops/query
      method: POST
      inputs:
        - name: in
          type: any
          required: false
      outputs:
        - name: out
          type: object
      config_schema:
        - field: source_db
          type: string
          label: Source Database
          required: true
          supports_variables: true
        - field: target_db
          type: string
          label: Target Database
          required: true
          supports_variables: true
        - field: continuous
          type: checkbox
          label: Continuous
          default: false

  transforms:
    - id: query_lookup
      name: Query Lookup
      description: Lookup data from CouchDB
      icon: "🔎"
      endpoint: /api/v1/database-ops/query
      method: POST
      inputs:
        - name: in
          type: any
          required: true
      outputs:
        - name: out
          type: object
      config_schema:
        - field: table
          type: string
          label: Database
          required: true
          supports_variables: true
        - field: where
          type: textarea
          label: Where (JSON)
          supports_variables: true
        - field: limit
          type: number
          label: Limit
          default: 1

    - id: count_rows
      name: Count Documents
      description: Count matching documents
      icon: "🔢"
      endpoint: /api/v1/database-ops/count
      method: GET
      inputs:
        - name: in
          type: any
          required: true
      outputs:
        - name: out
          type: object
      config_schema:
        - field: table
          type: string
          label: Database
          required: true
          supports_variables: true
        - field: where
          type: textarea
          label: Where (JSON)
          supports_variables: true

    - id: check_exists
      name: Check Exists
      description: Check if a document exists
      icon: "❓"
      endpoint: /api/v1/database-ops/exists
      method: GET
      inputs:
        - name: in
          type: any
          required: true
      outputs:
        - name: out
          type: object
      config_schema:
        - field: table
          type: string
          label: Database
          required: true
          supports_variables: true
        - field: where
          type: textarea
          label: Where (JSON)
          required: true
          supports_variables: true

    - id: get_schema
      name: Get Schema
      description: Get schema information
      icon: "📋"
      endpoint: /api/v1/database-ops/schema
      method: GET
      inputs:
        - name: in
          type: any
          required: false
      outputs:
        - name: out
          type: object
      config_schema:
        - field: table
          type: string
          label: Database Name
          supports_variables: true
