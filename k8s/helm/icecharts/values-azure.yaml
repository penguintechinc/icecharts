# ============================================================================
# IceCharts Helm Chart - Microsoft Azure Environment Values
# ============================================================================
# This file overrides base values.yaml for deployments on Azure Kubernetes
# Service (AKS) using Azure Application Gateway or Azure Load Balancer as
# the ingress controller and Azure Key Vault for secret management.
#
# Key features:
# - Azure Application Gateway ingress controller (AGIC) integration
# - Azure Key Vault for secure secret management via External Secrets Operator
# - Managed identity for secure OIDC-based authentication
# - Premium managed disks for high-performance persistent volumes
# - High availability setup with 3 replicas for API and Web services
# - Auto-scaling enabled for API and Web services based on CPU/memory
# - Production-grade resources (100% of base values)
# - Network policies enabled for security
# - Monitoring stack (Prometheus + Grafana) enabled
# - Database backups enabled with 200Gi storage
#
# Prerequisites:
# - External Secrets Operator installed in cluster
# - Azure Workload Identity configured between cluster and Azure
# - Managed identity with Key Vault Reader role
# - Azure Key Vault created and secrets stored
# - Application Gateway created and configured
#
# Usage:
#   helm install icecharts . -f values.yaml -f values-azure.yaml
# ============================================================================

# ============================================================================
# Global Settings
# ============================================================================
global:
  # Use Azure managed-premium storage class for high performance
  storageClass: managed-premium

# ============================================================================
# Secrets Management
# ============================================================================
secrets:
  # Use External Secrets Operator for Azure Key Vault integration
  provider: external-secrets

  # External Secrets Operator configuration
  externalSecrets:
    # Use Azure Key Vault backend
    backend: azure

    # Refresh secrets every hour
    refreshInterval: 1h

    # Azure configuration
    azure:
      # Update with your Azure Key Vault URL
      # Format: https://VAULT_NAME.vault.azure.net/
      vaultUrl: "https://vault.vault.azure.net/"

      # Azure tenant ID for authentication
      # Format: UUID
      tenantId: "TENANT_ID"

      # Client ID for Managed Identity (optional)
      # Leave empty to use default managed identity
      clientId: ""

      # Secret names in Azure Key Vault
      secrets:
        postgresPassword: "postgres-password"
        postgresUser: "postgres-user"
        postgresDb: "postgres-db"
        redisPassword: "redis-password"
        minioRootUser: "minio-root-user"
        minioRootPassword: "minio-root-password"
        secretKey: "flask-secret-key"
        jwtSecretKey: "jwt-secret-key"
        defaultAdminEmail: "admin-email"
        defaultAdminPassword: "admin-password"
        licenseKey: "license-key"

# ============================================================================
# PostgreSQL Configuration
# ============================================================================
postgres:
  # Single primary node (can be scaled with replicas for HA)
  replicaCount: 1

  # Production-grade storage
  persistence:
    enabled: true
    size: 100Gi

  # Production resources (100% of base)
  resources:
    requests:
      memory: "500Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

# ============================================================================
# Redis Configuration
# ============================================================================
redis:
  # Single node (can be scaled with replicas for HA)
  replicaCount: 1

  # Production-grade storage
  persistence:
    enabled: true
    size: 50Gi

  # Production resources (100% of base)
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "500m"

# ============================================================================
# MinIO Configuration
# ============================================================================
minio:
  # Single node (can be scaled with replicas for distributed mode)
  replicaCount: 1

  # Production-grade storage
  persistence:
    enabled: true
    size: 100Gi

  # Production resources (100% of base)
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

# ============================================================================
# API (Flask Backend) Configuration
# ============================================================================
api:
  # Multiple replicas for high availability
  replicaCount: 3

  # Environment configuration for Azure
  env:
    # Production settings
    debug: "false"
    logLevel: info
    flaskEnv: production

  # Production resources (100% of base)
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

  # Enable auto-scaling for production workloads
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
    scaleDownStabilizationWindowSeconds: 300
    scaleUpStabilizationWindowSeconds: 60

# ============================================================================
# Web (React Frontend) Configuration
# ============================================================================
web:
  # Multiple replicas for high availability
  replicaCount: 3

  # Production resources (100% of base)
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "500m"

  # Enable auto-scaling for production workloads
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# ============================================================================
# Ingress Configuration
# ============================================================================
ingress:
  # Enable ingress for Azure Application Gateway
  enabled: true

  # Use Azure Application Gateway as ingress controller
  className: azure/application-gateway

  # Update with your domain name
  host: icecharts.example.com

  # Enable TLS with certificate
  tls:
    enabled: true
    # Name of the certificate stored in Application Gateway or Key Vault
    azureCertificateName: icecharts-cert

  # Azure Application Gateway specific annotations
  annotations:
    cert.keda.sh/cert-name: icecharts-cert
    appgw.ingress.kubernetes.io/backend-protocol: http
    appgw.ingress.kubernetes.io/cookie-based-affinity: "true"
    appgw.ingress.kubernetes.io/request-timeout: "20s"

# ============================================================================
# Monitoring Configuration
# ============================================================================
monitoring:
  # Enable monitoring stack for production
  enabled: true

  prometheus:
    # Enable Prometheus for metrics collection
    enabled: true

    # Production storage for Prometheus
    persistence:
      enabled: true
      size: 100Gi

    # Production resources
    resources:
      requests:
        memory: "1Gi"
        cpu: "500m"
      limits:
        memory: "4Gi"
        cpu: "2000m"

  grafana:
    # Enable Grafana for metrics visualization
    enabled: true

    # Storage for Grafana dashboards and data
    persistence:
      enabled: true
      size: 10Gi

    # Production resources
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "2Gi"
        cpu: "1000m"

  # Enable ServiceMonitor for Prometheus Operator
  serviceMonitor:
    enabled: true
    scrapeInterval: 30s

# ============================================================================
# Network Policies
# ============================================================================
networkPolicies:
  # Enable network policies for production security
  enabled: true

  # Allow both ingress and egress traffic
  policyTypes:
    - Ingress
    - Egress

  # Allow DNS resolution for external services
  allowDns: true

# ============================================================================
# Database Backup Configuration
# ============================================================================
backup:
  # Enable automated backups for production
  enabled: true

  # Run backups daily at 2 AM UTC
  schedule: "0 2 * * *"

  # Retain backups for 30 days
  retention: 30

  # Production backup storage
  persistence:
    enabled: true
    size: 200Gi

  # Resources for backup jobs
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "500m"

# ============================================================================
# Pod Disruption Budget
# ============================================================================
podDisruptionBudget:
  # Enable PDB for production to ensure availability during cluster updates
  enabled: true

  api:
    # Allow at least 1 replica to be available
    minAvailable: 1

  web:
    # Allow at least 1 replica to be available
    minAvailable: 1
