# Development environment overrides
namespace: icecharts-dev

web:
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

api:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

postgres:
  storage: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

redis:
  storage: 1Gi

minio:
  storage: 10Gi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 512Mi

ingress:
  enabled: false

config:
  FLASK_ENV: "development"
  LOG_LEVEL: "debug"
  RELEASE_MODE: "false"
  CORS_ORIGINS: "http://localhost:3000"
