# ============================================================================
# IceCharts Helm Chart - Google Cloud Platform (GCP) Environment Values
# ============================================================================
# This file overrides base values.yaml for deployments on Google Kubernetes
# Engine (GKE) using GCE (Google Cloud Load Balancer) as the ingress
# controller and Google Secret Manager for secret management.
#
# Key features:
# - GCE ingress controller integration with managed certificates
# - Google Secret Manager for secure secret management via External Secrets Operator
# - Workload Identity for secure OIDC-based authentication
# - PD-SSD storage class for high-performance persistent volumes
# - High availability setup with 3 replicas for API and Web services
# - Auto-scaling enabled for API and Web services based on CPU/memory
# - Production-grade resources (100% of base values)
# - Network policies enabled for security
# - Monitoring stack (Prometheus + Grafana) enabled
# - Database backups enabled with 200Gi storage
# - Static IP configuration for consistent external access
#
# Prerequisites:
# - External Secrets Operator installed in cluster
# - Workload Identity configured between cluster and GCP
# - Service account with Secret Manager Reader role
# - Managed certificate created in Google Cloud
# - Static IP address reserved in Google Cloud
#
# Usage:
#   helm install icecharts . -f values.yaml -f values-gcp.yaml
# ============================================================================

# ============================================================================
# Global Settings
# ============================================================================
global:
  # Use GCP PD-SSD storage class for high performance
  storageClass: pd-ssd

# ============================================================================
# Secrets Management
# ============================================================================
secrets:
  # Use External Secrets Operator for Google Secret Manager integration
  provider: external-secrets

  # External Secrets Operator configuration
  externalSecrets:
    # Use Google Secret Manager backend
    backend: gcp

    # Refresh secrets every hour
    refreshInterval: 1h

    # GCP configuration
    gcp:
      # Update with your GCP project ID
      projectId: "my-project"

      # Prefix for secret names in Google Secret Manager
      secretsPrefix: "icecharts-prod-"

      # Service account email for Workload Identity
      # Format: gke-sa@PROJECT_ID.iam.gserviceaccount.com
      # Leave empty to use default service account
      serviceAccountEmail: ""

      # Secret names in Google Secret Manager
      secrets:
        postgres: "postgres-credentials"
        redis: "redis-credentials"
        minio: "minio-credentials"
        api: "api-secrets"
        admin: "admin-credentials"
        oauth: "oauth-credentials"
        smtp: "smtp-credentials"

# ============================================================================
# PostgreSQL Configuration
# ============================================================================
postgres:
  # Single primary node (can be scaled with replicas for HA)
  replicaCount: 1

  # Production-grade storage
  persistence:
    enabled: true
    size: 100Gi

  # Production resources (100% of base)
  resources:
    requests:
      memory: "500Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

# ============================================================================
# Redis Configuration
# ============================================================================
redis:
  # Single node (can be scaled with replicas for HA)
  replicaCount: 1

  # Production-grade storage
  persistence:
    enabled: true
    size: 50Gi

  # Production resources (100% of base)
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "500m"

# ============================================================================
# MinIO Configuration
# ============================================================================
minio:
  # Single node (can be scaled with replicas for distributed mode)
  replicaCount: 1

  # Production-grade storage
  persistence:
    enabled: true
    size: 100Gi

  # Production resources (100% of base)
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

# ============================================================================
# API (Flask Backend) Configuration
# ============================================================================
api:
  # Multiple replicas for high availability
  replicaCount: 3

  # Environment configuration for GCP
  env:
    # Production settings
    debug: "false"
    logLevel: info
    flaskEnv: production

  # Production resources (100% of base)
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

  # Enable auto-scaling for production workloads
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
    scaleDownStabilizationWindowSeconds: 300
    scaleUpStabilizationWindowSeconds: 60

# ============================================================================
# Web (React Frontend) Configuration
# ============================================================================
web:
  # Multiple replicas for high availability
  replicaCount: 3

  # Production resources (100% of base)
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "500m"

  # Enable auto-scaling for production workloads
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# ============================================================================
# Ingress Configuration
# ============================================================================
ingress:
  # Enable ingress for GCP GCE
  enabled: true

  # Use Google Cloud Load Balancer as ingress controller
  className: gce

  # Update with your domain name
  host: icecharts.example.com

  # Enable TLS with managed certificate
  tls:
    enabled: true
    # Name of the Google Cloud managed certificate
    # Must be created separately in Google Cloud Console
    managedCertificateName: icecharts-cert

  # Static IP address for consistent access
  # Must be reserved in Google Cloud Console
  # Update with your static IP name
  staticIpName: icecharts-ip

  # GCP GCE specific annotations
  annotations:
    kubernetes.io/ingress.global-static-ip-name: icecharts-ip
    ingress.kubernetes.io/pre-shared-cert: icecharts-cert
    kubernetes.io/ingress.class: gce

# ============================================================================
# Monitoring Configuration
# ============================================================================
monitoring:
  # Enable monitoring stack for production
  enabled: true

  prometheus:
    # Enable Prometheus for metrics collection
    enabled: true

    # Production storage for Prometheus
    persistence:
      enabled: true
      size: 100Gi

    # Production resources
    resources:
      requests:
        memory: "1Gi"
        cpu: "500m"
      limits:
        memory: "4Gi"
        cpu: "2000m"

  grafana:
    # Enable Grafana for metrics visualization
    enabled: true

    # Storage for Grafana dashboards and data
    persistence:
      enabled: true
      size: 10Gi

    # Production resources
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "2Gi"
        cpu: "1000m"

  # Enable ServiceMonitor for Prometheus Operator
  serviceMonitor:
    enabled: true
    scrapeInterval: 30s

# ============================================================================
# Network Policies
# ============================================================================
networkPolicies:
  # Enable network policies for production security
  enabled: true

  # Allow both ingress and egress traffic
  policyTypes:
    - Ingress
    - Egress

  # Allow DNS resolution for external services
  allowDns: true

# ============================================================================
# Database Backup Configuration
# ============================================================================
backup:
  # Enable automated backups for production
  enabled: true

  # Run backups daily at 2 AM UTC
  schedule: "0 2 * * *"

  # Retain backups for 30 days
  retention: 30

  # Production backup storage
  persistence:
    enabled: true
    size: 200Gi

  # Resources for backup jobs
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "500m"

# ============================================================================
# Pod Disruption Budget
# ============================================================================
podDisruptionBudget:
  # Enable PDB for production to ensure availability during cluster updates
  enabled: true

  api:
    # Allow at least 1 replica to be available
    minAvailable: 1

  web:
    # Allow at least 1 replica to be available
    minAvailable: 1
