# Beta/staging environment overrides (icecharts.penguintech.io)
namespace: icecharts-beta

image:
  registry: registry-dal2.penguintech.io
  tag: "beta"

ingress:
  # Disabled: ingress for icecharts.penguintech.io is managed in the
  # icecharts namespace (created via kustomize). The nginx admission
  # webhook rejects duplicate host+path across namespaces.
  enabled: false
  host: icecharts.penguintech.io
  tls:
    enabled: true
    secretName: icecharts-tls

# Minio image from dal2 registry (Docker Hub not accessible from cluster)
minio:
  image:
    repository: registry-dal2.penguintech.io/minio
    tag: "latest"

config:
  FLASK_ENV: "production"
  LOG_LEVEL: "info"
  RELEASE_MODE: "false"
  CORS_ORIGINS: "https://icecharts.penguintech.io"
