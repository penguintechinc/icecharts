# Beta/staging environment overrides (icecharts.penguintech.cloud)
# Uses icecharts namespace (each cluster has its own icecharts namespace)
namespace:
  create: false
  name: icecharts

# Global overrides for dal2 cluster (no Docker Hub access)
global:
  busyboxImage: "registry-dal2.penguintech.io/busybox:1.35"

# API image from dal2 registry
api:
  image:
    registry: registry-dal2.penguintech.io
    repository: icecharts-api
    tag: "beta"

# Web image from dal2 registry
web:
  image:
    registry: registry-dal2.penguintech.io
    repository: icecharts-web
    tag: "beta"

ingress:
  # Disabled: ingress for icecharts.penguintech.cloud is managed in the
  # icecharts namespace (created via kustomize). The nginx admission
  # webhook rejects duplicate host+path across namespaces.
  enabled: false
  host: icecharts.penguintech.cloud
  tls:
    enabled: true
    secretName: icecharts-tls

httproute:
  enabled: true
  gatewayName: shared
  gatewayNamespace: gateway
  host: "icecharts.penguintech.cloud"
  rules:
    - path: /api
      service: "icecharts-api-service"
      port: 5000
    - path: /
      service: "icecharts-web-service"
      port: 8080

# Minio image from dal2 registry (Docker Hub not accessible from cluster)
minio:
  image:
    registry: registry-dal2.penguintech.io
    repository: minio
    tag: "latest"

# Postgres image from dal2 registry
postgres:
  image:
    registry: registry-dal2.penguintech.io
    repository: postgres
    tag: "17-alpine"

# Redis image from dal2 registry
redis:
  image:
    registry: registry-dal2.penguintech.io
    repository: redis
    tag: "7-alpine"

config:
  FLASK_ENV: "production"
  LOG_LEVEL: "info"
  RELEASE_MODE: "false"
  CORS_ORIGINS: "https://icecharts.penguintech.cloud"
