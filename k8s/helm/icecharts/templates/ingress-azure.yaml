{{- /*
Azure Application Gateway Ingress Template
- Standard Kubernetes Ingress with Azure Application Gateway controller annotations
- Configures backend path prefix and cookie-based affinity for sticky sessions
- Integrates with Azure Application Gateway for layer 7 load balancing
*/ -}}
{{- if and .Values.ingress.enabled (eq .Values.ingress.className "azure/application-gateway") }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "icecharts.fullname" . }}-appgw
  namespace: {{ include "icecharts.namespace" . }}
  labels:
    {{- include "icecharts.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/ingress.class: azure/application-gateway
    appgw.ingress.kubernetes.io/backend-path-prefix: "/"
    appgw.ingress.kubernetes.io/cookie-based-affinity: "true"
    {{- if .Values.ingress.tls.enabled }}
    appgw.ingress.kubernetes.io/ssl-redirect: "443"
    {{- if .Values.ingress.tls.azureCertificateName }}
    appgw.ingress.kubernetes.io/certificate: {{ .Values.ingress.tls.azureCertificateName | quote }}
    {{- end }}
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          # Root path - serves the web frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "icecharts.web.fullname" . }}-service
                port:
                  number: 80

          # API routes
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "icecharts.api.fullname" . }}-service
                port:
                  number: 80

          # WebSocket routes
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: {{ include "icecharts.api.fullname" . }}-service
                port:
                  number: 80

  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}

{{- end }}
