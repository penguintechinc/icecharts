{{- /*
Prometheus Service Template
- Exposes the Prometheus deployment as a Kubernetes service
- Provides internal DNS name for Prometheus access
- Used by Grafana and other monitoring tools as a data source
*/ -}}
{{- if .Values.monitoring.prometheus.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "icecharts.prometheus.fullname" . }}
  namespace: {{ include "icecharts.namespace" . }}
  labels:
    {{- include "icecharts.labels" . | nindent 4 }}
  annotations:
    description: "Service for Prometheus monitoring server"
spec:
  type: {{ .Values.monitoring.prometheus.service.type }}
  selector:
    {{- include "icecharts.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/name: {{ include "icecharts.name" . }}-prometheus
  ports:
    - name: http
      port: {{ .Values.monitoring.prometheus.service.port }}
      targetPort: http
      protocol: TCP

{{- end }}
