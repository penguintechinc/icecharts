{{- /*
NetworkPolicy for API (Flask Backend)
- Allows ingress from ingress controller
- Allows ingress from Web pods
- Allows egress to PostgreSQL, Redis, and MinIO services
- Allows egress to external networks for license server
- Allows DNS egress for external resolution
*/ -}}
{{- if .Values.networkPolicies.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: icecharts-api-policy
  namespace: {{ include "icecharts.namespace" . }}
  labels:
    {{- include "icecharts.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  annotations:
    description: "NetworkPolicy for API backend - allows controlled ingress and egress"
spec:
  podSelector:
    matchLabels:
      {{- include "icecharts.api.selectorLabels" . | nindent 6 }}
  policyTypes:
    {{- toYaml .Values.networkPolicies.policyTypes | nindent 4 }}
  ingress:
    # Allow ingress from ingress controller (check for standard ingress labels)
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 5000
    # Allow ingress from Web pods
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: frontend
      ports:
        - protocol: TCP
          port: 5000
  egress:
    # Allow egress to PostgreSQL by label selector
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: database
      ports:
        - protocol: TCP
          port: 5432
    # Allow egress to Redis by label selector
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: cache
      ports:
        - protocol: TCP
          port: 6379
    # Allow egress to MinIO by label selector
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: storage
      ports:
        - protocol: TCP
          port: 9000
    # Allow egress to external networks for license server
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
    # Allow DNS egress for external resolution
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
