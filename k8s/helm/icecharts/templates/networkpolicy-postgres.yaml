{{- /*
NetworkPolicy for PostgreSQL
- Allows ingress from API pods on port 5432
- Allows DNS egress for external resolution
- Denies all other traffic
*/ -}}
{{- if .Values.networkPolicies.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: icecharts-postgres-policy
  namespace: {{ include "icecharts.namespace" . }}
  labels:
    {{- include "icecharts.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
  annotations:
    description: "NetworkPolicy for PostgreSQL database - allows ingress from API pods"
spec:
  podSelector:
    matchLabels:
      {{- include "icecharts.postgres.selectorLabels" . | nindent 6 }}
  policyTypes:
    {{- toYaml .Values.networkPolicies.policyTypes | nindent 4 }}
  ingress:
    # Allow ingress from API pods on port 5432
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: backend
      ports:
        - protocol: TCP
          port: 5432
  egress:
    # Allow DNS egress for name resolution
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
