{{- /*
Grafana Service Template
- Exposes the Grafana deployment as a Kubernetes service
- Provides access to the Grafana web UI
- Can be exposed via Ingress for external access
*/ -}}
{{- if .Values.monitoring.grafana.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "icecharts.grafana.fullname" . }}
  namespace: {{ include "icecharts.namespace" . }}
  labels:
    {{- include "icecharts.labels" . | nindent 4 }}
  annotations:
    description: "Service for Grafana visualization server"
spec:
  type: {{ .Values.monitoring.grafana.service.type }}
  selector:
    {{- include "icecharts.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/name: {{ include "icecharts.name" . }}-grafana
  ports:
    - name: http
      port: {{ .Values.monitoring.grafana.service.port }}
      targetPort: http
      protocol: TCP

{{- end }}
