{{- /*
Prometheus Deployment Template
- Deploys Prometheus monitoring server for metrics collection
- Configures scrape targets for API metrics
- Stores metrics in persistent volume
- Exposes metrics on port 9090
*/ -}}
{{- if .Values.monitoring.prometheus.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "icecharts.prometheus.fullname" . }}-config
  namespace: {{ include "icecharts.namespace" . }}
  labels:
    {{- include "icecharts.labels" . | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: {{ .Values.monitoring.prometheus.scrapeInterval | default "30s" }}
      scrape_timeout: {{ .Values.monitoring.prometheus.scrapeTimeout | default "10s" }}
      evaluation_interval: 30s

    alerting:
      alertmanagers:
        - static_configs:
            - targets: []

    rule_files: []

    scrape_configs:
      - job_name: 'api-metrics'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - {{ include "icecharts.namespace" . }}
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            action: keep
            regex: {{ include "icecharts.name" . }}-api
          - source_labels: [__meta_kubernetes_pod_ip]
            action: replace
            target_label: __address__
            replacement: $1:5000
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name
          - action: replace
            target_label: job
            replacement: {{ include "icecharts.api.fullname" . }}
        scrape_interval: {{ .Values.monitoring.prometheus.scrapeInterval | default "30s" }}
        metrics_path: /metrics

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "icecharts.prometheus.fullname" . }}
  namespace: {{ include "icecharts.namespace" . }}
  labels:
    {{- include "icecharts.labels" . | nindent 4 }}
  annotations:
    description: "Prometheus monitoring server for IceCharts"
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "icecharts.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: monitoring
      app.kubernetes.io/name: {{ include "icecharts.name" . }}-prometheus
  template:
    metadata:
      labels:
        {{- include "icecharts.labels" . | nindent 8 }}
        app.kubernetes.io/component: monitoring
        app.kubernetes.io/name: {{ include "icecharts.name" . }}-prometheus
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "icecharts.serviceAccountName" . }}
      securityContext:
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        runAsNonRoot: true
      containers:
        - name: prometheus
          image: {{ .Values.monitoring.prometheus.image.registry }}/{{ .Values.monitoring.prometheus.image.repository }}:{{ .Values.monitoring.prometheus.image.tag }}
          imagePullPolicy: {{ .Values.monitoring.prometheus.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 9090
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--web.console.libraries=/usr/share/prometheus/console_libraries"
            - "--web.console.templates=/usr/share/prometheus/consoles"
          resources:
            {{- toYaml .Values.monitoring.prometheus.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: {{ include "icecharts.prometheus.fullname" . }}-config
        - name: data
          {{- if .Values.monitoring.prometheus.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "icecharts.prometheus.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
      terminationGracePeriodSeconds: 30

---
{{- if .Values.monitoring.prometheus.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "icecharts.prometheus.fullname" . }}-data
  namespace: {{ include "icecharts.namespace" . }}
  labels:
    {{- include "icecharts.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.monitoring.prometheus.persistence.accessMode }}
  resources:
    requests:
      storage: {{ .Values.monitoring.prometheus.persistence.size }}
  {{- if .Values.monitoring.prometheus.persistence.storageClass }}
  storageClassName: {{ .Values.monitoring.prometheus.persistence.storageClass }}
  {{- else if .Values.global.storageClass }}
  storageClassName: {{ .Values.global.storageClass }}
  {{- end }}
{{- end }}

{{- end }}
