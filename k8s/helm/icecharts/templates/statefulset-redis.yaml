{{- /*
Redis StatefulSet Template
- Manages Redis 7 cache with persistent storage
- Single replica
- Configured with password authentication and AOF persistence
- Includes health checks and security context
*/ -}}
{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "icecharts.redis.fullname" . }}
  namespace: {{ include "icecharts.namespace" . }}
  labels:
    {{- include "icecharts.redis.labels" . | nindent 4 }}
  annotations:
    description: "Redis 7 cache for IceCharts"
spec:
  serviceName: {{ include "icecharts.redis.fullname" . }}-service
  replicas: {{ .Values.redis.replicaCount }}
  selector:
    matchLabels:
      {{- include "icecharts.redis.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "icecharts.redis.labels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "false"
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "icecharts.serviceAccountName" . }}
      securityContext:
        runAsUser: {{ .Values.redis.securityContext.runAsUser }}
        runAsGroup: {{ .Values.redis.securityContext.runAsGroup }}
        fsGroup: {{ .Values.redis.securityContext.fsGroup }}
        runAsNonRoot: {{ .Values.redis.securityContext.runAsNonRoot }}
      containers:
        - name: redis
          image: {{ include "icecharts.redis.image" . }}
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
          command:
            - redis-server
            - --requirepass
            - $(REDIS_PASSWORD)
            - --appendonly
            - "yes"
            - --appendfsync
            - "everysec"
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "icecharts.secretName" . }}
                  key: redis-password
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            exec:
              command:
                - redis-cli
                - -a
                - $(REDIS_PASSWORD)
                - ping
            initialDelaySeconds: {{ .Values.redis.healthCheck.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.redis.healthCheck.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.redis.healthCheck.readiness.timeoutSeconds }}
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - redis-cli
                - -a
                - $(REDIS_PASSWORD)
                - ping
            initialDelaySeconds: {{ .Values.redis.healthCheck.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.redis.healthCheck.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.redis.healthCheck.liveness.timeoutSeconds }}
            failureThreshold: 3
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "icecharts.redis.selectorLabels" . | nindent 10 }}
      spec:
        accessModes:
          - {{ .Values.redis.persistence.accessMode }}
        {{- if .Values.redis.persistence.storageClass }}
        storageClassName: {{ .Values.redis.persistence.storageClass }}
        {{- else if .Values.global.storageClass }}
        storageClassName: {{ .Values.global.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.redis.persistence.size }}
{{- end }}
