apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "icecharts.fullname" . }}-web
  namespace: {{ include "icecharts.namespace" . }}
  labels:
    {{- include "icecharts.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      {{- include "icecharts.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "icecharts.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: web
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 1000
      containers:
      - name: web
        image: {{ include "icecharts.web.image" . }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.web.port }}
          protocol: TCP
        envFrom:
        - configMapRef:
            name: {{ include "icecharts.fullname" . }}-config
        securityContext:
          runAsUser: 101
          runAsGroup: 101
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          readOnlyRootFilesystem: false
        resources:
          {{- toYaml .Values.web.resources | nindent 10 }}
        livenessProbe:
          {{- toYaml .Values.web.livenessProbe | nindent 10 }}
        readinessProbe:
          {{- toYaml .Values.web.readinessProbe | nindent 10 }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app.kubernetes.io/component
                  operator: In
                  values: ["web"]
              topologyKey: kubernetes.io/hostname
