{{- /*
API Horizontal Pod Autoscaler Template
- Scales the API deployment based on CPU and memory metrics
- Uses Kubernetes autoscaling v2 API for advanced scaling options
- Implements stabilization windows for smooth scaling behavior
- Tracks both CPU and memory utilization for scaling decisions
*/ -}}
{{- if and .Values.api.autoscaling.enabled (gt (int .Values.api.replicaCount) 0) }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "icecharts.api.fullname" . }}-hpa
  namespace: {{ include "icecharts.namespace" . }}
  labels:
    {{- include "icecharts.api.labels" . | nindent 4 }}
  annotations:
    description: "Autoscaler for IceCharts API deployment"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "icecharts.api.fullname" . }}

  minReplicas: {{ .Values.api.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.api.autoscaling.maxReplicas }}

  metrics:
    # CPU-based scaling
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.api.autoscaling.targetCPUUtilizationPercentage | default 70 }}

    # Memory-based scaling
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.api.autoscaling.targetMemoryUtilizationPercentage | default 80 }}

  behavior:
    scaleDown:
      stabilizationWindowSeconds: {{ .Values.api.autoscaling.scaleDownStabilizationWindowSeconds | default 300 }}
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
        - type: Pods
          value: 1
          periodSeconds: 60
      selectPolicy: Min

    scaleUp:
      stabilizationWindowSeconds: {{ .Values.api.autoscaling.scaleUpStabilizationWindowSeconds | default 60 }}
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max

{{- end }}
