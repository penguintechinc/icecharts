apiVersion: v1
kind: Service
metadata:
  name: {{ include "icecharts.fullname" . }}-api
  namespace: {{ include "icecharts.namespace" . }}
  labels:
    {{- include "icecharts.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    {{- include "icecharts.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
  ports:
  - port: {{ .Values.api.port }}
    targetPort: {{ .Values.api.port }}
    protocol: TCP
    name: http
