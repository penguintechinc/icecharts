# IceRuns Invoker ServiceAccount
# Provides identity and RBAC for invoker pods
apiVersion: v1
kind: ServiceAccount
metadata:
  name: iceruns-invoker
  namespace: iceruns
  labels:
    app.kubernetes.io/name: iceruns
    app.kubernetes.io/component: invoker
---
# Cluster Role for invoker pod operations
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: iceruns-invoker
  labels:
    app.kubernetes.io/name: iceruns
    app.kubernetes.io/component: invoker
rules:
# Read pod information
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
# Read pod logs
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]
# Get events for debugging
- apiGroups: [""]
  resources: ["events"]
  verbs: ["get", "list"]
---
# Cluster Role Binding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: iceruns-invoker
  labels:
    app.kubernetes.io/name: iceruns
    app.kubernetes.io/component: invoker
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: iceruns-invoker
subjects:
- kind: ServiceAccount
  name: iceruns-invoker
  namespace: iceruns
