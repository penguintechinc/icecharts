apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: icecharts
  namespace: icecharts-beta
  labels:
    app.kubernetes.io/name: icecharts
    app.kubernetes.io/version: "1.0.2"
    app.kubernetes.io/managed-by: kubectl
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - icecharts.penguintech.io
    secretName: icecharts-tls
  rules:
  - host: icecharts.penguintech.io
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: api
            port:
              number: 5000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: web
            port:
              number: 8080
