# GCP Storage Class Patch
# Configures Google Cloud Persistent Disks for persistent volumes
# Uses PD-SSD (Solid State Disk) for high-performance storage

apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gcp-pd-ssd
provisioner: pd.csi.storage.gke.io
parameters:
  type: pd-ssd
  replication-type: regional-pd
reclaimPolicy: Retain
allowVolumeExpansion: true

---
# Patch PVCs to use PD-SSD storage
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-storage-postgres-0
  namespace: icecharts
spec:
  storageClassName: gcp-pd-ssd
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-storage-redis-0
  namespace: icecharts
spec:
  storageClassName: gcp-pd-ssd
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-storage-minio-0
  namespace: icecharts
spec:
  storageClassName: gcp-pd-ssd
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
