# AWS ALB (Application Load Balancer) Ingress
# Configures AWS EKS ingress using AWS Load Balancer Controller
# Requires: aws-load-balancer-controller addon installed on EKS cluster

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: icecharts-aws
  namespace: icecharts
  annotations:
    # AWS Load Balancer Controller annotations
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    # SSL redirect (uncomment if using HTTPS)
    # alb.ingress.kubernetes.io/ssl-redirect: '443'
    # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:region:account-id:certificate/certificate-id

    # Health check configuration
    alb.ingress.kubernetes.io/healthcheck-path: /api/v1/health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: '30'
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: '5'
    alb.ingress.kubernetes.io/healthy-threshold-count: '2'
    alb.ingress.kubernetes.io/unhealthy-threshold-count: '2'

    # Tags for AWS resource management
    alb.ingress.kubernetes.io/tags: Environment=production,Application=icecharts

  labels:
    app.kubernetes.io/name: icecharts
    environment: aws-production

spec:
  rules:
  - http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: api
            port:
              number: 5000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: web
            port:
              number: 3000
