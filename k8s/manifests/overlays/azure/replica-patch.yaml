# Replica patch for Azure production
# Sets production replicas (3 replicas per stateless service for HA)

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: icecharts
spec:
  replicas: 3

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: icecharts
spec:
  replicas: 3
