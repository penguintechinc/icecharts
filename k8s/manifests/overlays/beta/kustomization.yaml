# Beta Environment Overlay for Kubernetes
# Optimized for beta testing on dal2-beta cluster
# Usage: kubectl --context dal2-beta apply -k overlays/beta/

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Reference the base kustomization
resources:
  - ../../base

# Override namespace for beta
namespace: icecharts

# Apply patches for beta environment using JSON patch syntax
patches:
  # Replica patches - beta gets more replicas than alpha
  - target:
      kind: Deployment
      name: api
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: web
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2

  # Image patches - use beta tags from dal2 registry
  - target:
      kind: Deployment
      name: api
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: ghcr.io/penguintechinc/icecharts/icecharts-api:latest
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Always
  - target:
      kind: Deployment
      name: web
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: ghcr.io/penguintechinc/icecharts/icecharts-web:latest
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Always

  # Resource patches for API - beta gets more resources
  - target:
      kind: Deployment
      name: api
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"

  # Resource patches for Web
  - target:
      kind: Deployment
      name: web
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"

# Labels for all resources
labels:
  - pairs:
      environment: beta
      managed-by: kustomize
      cluster: dal2-beta

commonAnnotations:
  description: "Beta testing environment on Kubernetes"
