# Resource limits patch for local development
# Reduces memory and CPU limits for local development environments
# Use small footprint suitable for development laptops/machines

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: icecharts
spec:
  template:
    spec:
      containers:
      - name: api
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "250m"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: icecharts
spec:
  template:
    spec:
      containers:
      - name: web
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "100m"

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: icecharts
spec:
  template:
    spec:
      containers:
      - name: postgres
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "250m"

---
apiVersion: apps/v1
