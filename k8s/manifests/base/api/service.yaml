# Flask API Backend Service
# Exposes the API on port 5000
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: icecharts
  labels:
    app.kubernetes.io/name: icecharts
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
  - name: http
    port: 5000
    targetPort: http
    protocol: TCP
