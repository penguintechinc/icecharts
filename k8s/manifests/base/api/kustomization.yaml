# Kustomization for Flask API Backend Deployment
# Manages the REST API application layer for IceCharts
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: icecharts

resources:
  - deployment.yaml
  - service.yaml

commonLabels:
  app.kubernetes.io/name: icecharts
  app.kubernetes.io/component: api
