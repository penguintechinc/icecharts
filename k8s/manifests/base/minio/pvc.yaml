# MinIO Persistent Volume Claim (optional - can be generated by StatefulSet)
# This file is included for reference and may be managed by the StatefulSet volumeClaimTemplates
# Actual PVC is created automatically by StatefulSet, but this shows the expected storage configuration

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-storage-minio-0
  namespace: icecharts
  labels:
    app.kubernetes.io/name: icecharts
    app.kubernetes.io/component: minio
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
