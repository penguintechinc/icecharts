# React Frontend Service
# Exposes the web application on port 3000
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: icecharts
  labels:
    app.kubernetes.io/name: icecharts
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  selector:
    app: web
  ports:
  - name: http
    port: 3000
    targetPort: http
    protocol: TCP
