# React Frontend Deployment
# Serves static files via Node.js or nginx with auto-scaling and rolling updates
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: icecharts
  labels:
    app.kubernetes.io/name: icecharts
    app.kubernetes.io/component: web
spec:
  replicas: 1  # Override in overlays for production
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
        app.kubernetes.io/name: icecharts
        app.kubernetes.io/component: web
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
    spec:
      serviceAccountName: default
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      containers:
      - name: web
        image: icecharts-web:latest  # Update to your actual image registry
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP

        # Environment variables from ConfigMap
        envFrom:
        - configMapRef:
            name: icecharts-config
        - secretRef:
            name: icecharts-secret

        # Override specific variables if needed
        env:
        - name: VITE_API_URL
          value: "http://api.icecharts.svc.cluster.local:5000"
        - name: VITE_API_BASE_PATH
          value: "/api/v1"

        resources:
          requests:
            memory: "256Mi"
            cpu: "75m"
          limits:
            memory: "512Mi"
            cpu: "250m"

        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5

        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false

        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: var-run
          mountPath: /var/run

      volumes:
      - name: tmp
        emptyDir: {}
      - name: var-run
        emptyDir: {}

      # Pod Disruption Budget for high availability
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - web
              topologyKey: kubernetes.io/hostname
