# NOTE: This PVC is not needed when using the StatefulSet with volumeClaimTemplates.
# The StatefulSet (minio-statefulset.yaml) automatically creates PVCs.
# Use this file only if you need a standalone MinIO deployment without StatefulSet.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  namespace: icecharts-beta
  labels:
    app: minio
    app.kubernetes.io/name: icecharts
    app.kubernetes.io/component: minio
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
