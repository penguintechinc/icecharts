apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: icecharts-alpha

namePrefix: alpha-

commonLabels:
  app.kubernetes.io/name: icecharts
  app.kubernetes.io/managed-by: kustomize
  environment: alpha

resources:
  - ../../base
  - secret.yaml
  - ingress.yaml

patches:
  - path: configmap-patch.yaml
  - target:
      kind: Deployment
      name: web
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: api
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1

images:
  - name: icecharts-web
    newTag: latest
  - name: icecharts-api
    newTag: latest
