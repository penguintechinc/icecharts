<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="iceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E1B4B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#312E81;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FEF3C7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FCD34D;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Night sky background circle -->
  <circle cx="60" cy="60" r="55" fill="url(#skyGradient)"/>

  <!-- Stars in the sky -->
  <circle cx="25" cy="20" r="2" fill="#FEF9C3"/>
  <circle cx="25" cy="20" r="4" fill="url(#starGlow)" opacity="0.5"/>

  <circle cx="45" cy="12" r="1.5" fill="#FEF9C3"/>
  <circle cx="45" cy="12" r="3" fill="url(#starGlow)" opacity="0.4"/>

  <circle cx="70" cy="8" r="2.5" fill="#FEF9C3"/>
  <circle cx="70" cy="8" r="5" fill="url(#starGlow)" opacity="0.5"/>

  <circle cx="90" cy="18" r="1.8" fill="#FEF9C3"/>
  <circle cx="90" cy="18" r="4" fill="url(#starGlow)" opacity="0.4"/>

  <circle cx="38" cy="30" r="1.2" fill="#E0E7FF"/>
  <circle cx="82" cy="28" r="1" fill="#E0E7FF"/>
  <circle cx="55" cy="22" r="1" fill="#FEF9C3"/>

  <!-- Constellation lines -->
  <path d="M25 20 L45 12 L70 8 L90 18" stroke="#6366F1" stroke-width="0.5" fill="none" opacity="0.6"/>
  <path d="M45 12 L55 22 L70 8" stroke="#6366F1" stroke-width="0.5" fill="none" opacity="0.4"/>

  <!-- Rockhopper Penguin Body -->
  <ellipse cx="60" cy="82" rx="24" ry="28" fill="#1a1a2e"/>

  <!-- White belly -->
  <ellipse cx="60" cy="86" rx="15" ry="20" fill="#f8fafc"/>

  <!-- Penguin head - tilted up looking at stars -->
  <ellipse cx="60" cy="52" rx="18" ry="16" fill="#1a1a2e" transform="rotate(-10 60 52)"/>

  <!-- White face patch -->
  <ellipse cx="61" cy="54" rx="10" ry="8" fill="#f8fafc" transform="rotate(-10 61 54)"/>

  <!-- Yellow eyebrow crests (rockhopper signature!) - swept back, looking up -->
  <path d="M44 42 Q36 32 28 34" stroke="#FCD34D" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M46 45 Q40 37 33 38" stroke="#FCD34D" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M48 47 Q44 41 38 42" stroke="#FBBF24" stroke-width="2" fill="none" stroke-linecap="round"/>

  <path d="M76 42 Q84 32 92 34" stroke="#FCD34D" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M74 45 Q80 37 87 38" stroke="#FCD34D" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M72 47 Q76 41 82 42" stroke="#FBBF24" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Eyes - looking up at the stars -->
  <circle cx="54" cy="50" r="4" fill="#1a1a2e"/>
  <circle cx="68" cy="50" r="4" fill="#1a1a2e"/>
  <circle cx="54" cy="48" r="1.5" fill="white"/>
  <circle cx="68" cy="48" r="1.5" fill="white"/>

  <!-- Orange beak - pointing slightly up -->
  <path d="M61 56 L56 62 L66 62 Z" fill="#F97316"/>

  <!-- Left flipper holding the chart -->
  <ellipse cx="34" cy="75" rx="7" ry="16" fill="#1a1a2e" transform="rotate(25 34 75)"/>

  <!-- Right flipper holding the chart -->
  <ellipse cx="86" cy="75" rx="7" ry="16" fill="#1a1a2e" transform="rotate(-25 86 75)"/>

  <!-- Star chart/map paper being held -->
  <g transform="translate(38, 68) rotate(-5)">
    <!-- Paper -->
    <rect x="0" y="0" width="44" height="32" rx="2" fill="#FEF3C7" stroke="#D4A574" stroke-width="1"/>
    <!-- Rolled edge hint -->
    <path d="M0 0 Q2 3 0 6" stroke="#D4A574" stroke-width="0.5" fill="none"/>

    <!-- Star chart content - constellation map -->
    <circle cx="10" cy="8" r="1.5" fill="#1E40AF"/>
    <circle cx="18" cy="12" r="1" fill="#1E40AF"/>
    <circle cx="25" cy="6" r="1.2" fill="#1E40AF"/>
    <circle cx="34" cy="10" r="1" fill="#1E40AF"/>
    <circle cx="30" cy="18" r="1.3" fill="#1E40AF"/>
    <circle cx="15" cy="22" r="1" fill="#1E40AF"/>
    <circle cx="8" cy="18" r="0.8" fill="#1E40AF"/>
    <circle cx="38" cy="22" r="1.1" fill="#1E40AF"/>

    <!-- Constellation lines on chart -->
    <path d="M10 8 L18 12 L25 6 L34 10" stroke="#3B82F6" stroke-width="0.5" fill="none"/>
    <path d="M18 12 L30 18 L38 22" stroke="#3B82F6" stroke-width="0.5" fill="none"/>
    <path d="M8 18 L15 22 L30 18" stroke="#3B82F6" stroke-width="0.5" fill="none"/>

    <!-- Grid lines on chart -->
    <line x1="4" y1="16" x2="40" y2="16" stroke="#94A3B8" stroke-width="0.3" opacity="0.5"/>
    <line x1="22" y1="4" x2="22" y2="28" stroke="#94A3B8" stroke-width="0.3" opacity="0.5"/>
  </g>

  <!-- Orange feet -->
  <ellipse cx="50" cy="108" rx="8" ry="4" fill="#F97316"/>
  <ellipse cx="70" cy="108" rx="8" ry="4" fill="#F97316"/>

  <!-- Text: IceCharts -->
  <text x="140" y="55" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#F8FAFC">
    <tspan fill="url(#iceGradient)">Ice</tspan><tspan fill="#F8FAFC">Charts</tspan>
  </text>

  <!-- Tagline -->
  <text x="140" y="80" font-family="Arial, sans-serif" font-size="12" fill="#94A3B8">
    Collaborative Diagram Platform
  </text>

  <!-- Small decorative stars near text -->
  <circle cx="350" cy="35" r="1.5" fill="#FEF9C3"/>
  <circle cx="370" cy="50" r="1" fill="#E0E7FF"/>
  <circle cx="385" cy="30" r="1.2" fill="#FEF9C3"/>
</svg>
